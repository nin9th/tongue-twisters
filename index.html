<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<title>Morning Twist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0e0c; --surface: #1a1916; --surface2: #232220;
  --gold: #d4a84b; --gold-dim: #8a6e30;
  --cream: #f0e8d8; --cream-dim: #a09080;
  --teal: #4ecdc4; --coral: #e8856a;
  --text-dim: #7a7068;
  --border: rgba(212,168,75,0.15); --border-bright: rgba(212,168,75,0.4);
  --radius: 14px;
}
html, body { background: var(--bg); color: var(--cream); font-family: 'Sora', sans-serif; height: 100%; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

/* HEADER */
.header { padding: 52px 20px 14px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; background: var(--bg); position: relative; z-index: 5; transition: transform 0.3s ease, opacity 0.3s ease; }
.header.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
.app-title { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--gold); letter-spacing: -0.3px; line-height: 1; }
.app-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
.progress-bar-wrap { margin-top: 12px; height: 2px; background: var(--surface2); border-radius: 2px; }
.progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s ease; }
.progress-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

/* VIEWS */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* LIST VIEW */
.list-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 100px; -webkit-overflow-scrolling: touch; }
.category-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin: 18px 0 8px; font-weight: 500; }
.twister-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
.twister-row:active { background: var(--surface2); border-color: var(--border-bright); }
.twister-row.done { border-color: rgba(78,205,196,0.25); }
.row-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); }
.row-body { flex: 1; min-width: 0; }
.row-title { font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-meta { display: flex; align-items: center; gap: 6px; }
.row-check { font-size: 15px; color: var(--teal); opacity: 0; flex-shrink: 0; }
.twister-row.done .row-check { opacity: 1; }
.cat-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.cat-th { background: rgba(212,168,75,0.12); color: var(--gold); }
.cat-rl { background: rgba(78,205,196,0.12); color: var(--teal); }
.cat-vw { background: rgba(232,133,106,0.12); color: var(--coral); }
.cat-final { background: rgba(160,144,128,0.1); color: var(--cream-dim); }
.cat-cluster { background: rgba(175,169,236,0.12); color: #afa9ec; }

/* PRACTICE VIEW */
.prac-header { display: flex; align-items: center; gap: 10px; padding: 52px 16px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; background: var(--bg); transition: transform 0.3s ease, opacity 0.3s ease; position: relative; z-index: 5; }
.prac-header.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
.back-btn { background: var(--surface2); border: 0.5px solid var(--border); color: var(--cream-dim); cursor: pointer; font-size: 16px; padding: 7px 13px; line-height: 1; border-radius: 9px; transition: all 0.15s; flex-shrink: 0; font-family: 'Sora', sans-serif; }
.back-btn:active { border-color: var(--border-bright); color: var(--gold); }
.prac-meta { flex: 1; min-width: 0; }
.prac-cat-label { margin-bottom: 2px; }
.prac-diff { font-size: 12px; color: var(--text-dim); }
.done-toggle { background: none; border: 0.5px solid var(--border-bright); color: var(--text-dim); font-family: 'Sora', sans-serif; font-size: 11px; padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
.done-toggle.marked { background: rgba(78,205,196,0.1); border-color: rgba(78,205,196,0.5); color: var(--teal); }
.prac-body { flex: 1; overflow-y: auto; padding: 16px 16px 100px; -webkit-overflow-scrolling: touch; }

.twister-display { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.diff-row { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
.diff-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.diff-easy { background: var(--teal); } .diff-medium { background: var(--gold); } .diff-hard { background: var(--coral); }
.diff-text { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.twister-text { font-family: 'Instrument Serif', serif; font-size: 19px; line-height: 1.55; color: var(--cream); }

.tip-box { background: rgba(212,168,75,0.05); border: 0.5px solid var(--border); border-left: 2px solid var(--gold); border-radius: 0 var(--radius) var(--radius) 0; padding: 13px 15px; margin-bottom: 18px; font-size: 13px; color: var(--cream-dim); line-height: 1.65; }
.tip-box strong { color: var(--cream); font-weight: 500; }

.section-head { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; font-weight: 500; }
.words-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
.word-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 7px 11px; cursor: pointer; transition: border-color 0.15s; text-align: center; user-select: none; }
.word-chip:active { background: var(--surface2); }
.word-chip.active { border-color: var(--gold); background: rgba(212,168,75,0.08); }
.word-chip.has-th { border-color: rgba(212,168,75,0.28); }
.wc-word { font-size: 13px; font-weight: 500; color: var(--cream); }
.wc-ipa { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 2px; }

.word-detail { background: var(--surface); border: 0.5px solid var(--border-bright); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; min-height: 80px; }
.wd-word { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--gold); margin-bottom: 2px; }
.wd-ipa { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
.wd-tag { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 999px; margin-bottom: 10px; }
.wd-tag-voiced { background: rgba(212,168,75,0.12); color: var(--gold); }
.wd-tag-voiceless { background: rgba(78,205,196,0.12); color: var(--teal); }
.wd-tag-none { background: var(--surface2); color: var(--text-dim); }
.wd-body { font-size: 13px; color: var(--cream-dim); line-height: 1.7; }
.wd-body strong { color: var(--cream); font-weight: 500; }
.wd-body em { font-style: italic; color: var(--cream); }
.placeholder-msg { color: var(--text-dim); font-size: 13px; padding: 6px 0; line-height: 1.6; }

.nav-arrows { display: flex; gap: 8px; }
.nav-arrows button { flex: 1; }

button { background: var(--surface2); border: 0.5px solid var(--border); color: var(--cream-dim); font-family: 'Sora', sans-serif; font-size: 13px; padding: 10px 16px; border-radius: 10px; cursor: pointer; -webkit-appearance: none; }
button:active { background: var(--surface); border-color: var(--border-bright); color: var(--cream); transform: scale(0.98); }

/* STATS VIEW */
.stats-scroll { flex: 1; overflow-y: auto; padding: 20px 16px 100px; -webkit-overflow-scrolling: touch; }
.stats-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--gold); margin-bottom: 18px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-num { font-size: 32px; font-weight: 600; color: var(--cream); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.cat-stat-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.cat-stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
.cat-stat-item { margin-bottom: 13px; }
.cat-stat-item:last-child { margin-bottom: 0; }
.cat-stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.cat-stat-count { font-size: 12px; color: var(--text-dim); }
.cat-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; }
.cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.reset-btn { width: 100%; margin-top: 4px; color: rgba(232,133,106,0.7); border-color: rgba(232,133,106,0.15); }

/* BOTTOM NAV */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(15,14,12,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 0.5px solid var(--border); display: flex; padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); gap: 6px; z-index: 10; transition: transform 0.3s ease, opacity 0.3s ease; }
.bottom-nav.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
.nav-tab { flex: 1; background: none; border: none; color: var(--text-dim); font-family: 'Sora', sans-serif; font-size: 11px; padding: 8px 4px; cursor: pointer; border-radius: 9px; text-align: center; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-tab .tab-icon { font-size: 18px; line-height: 1; }
.nav-tab.active { color: var(--gold); background: rgba(212,168,75,0.08); }
.nav-tab:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="app">

  <div class="header" id="main-header">
    <div class="app-title">Morning Twist</div>
    <div class="app-sub">English for Thai speakers</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 of 12 practiced</div>
  </div>

  <!-- LIST VIEW -->
  <div class="view active" id="view-list">
    <div class="list-scroll" id="list-scroll"></div>
  </div>

  <!-- PRACTICE VIEW -->
  <div class="view" id="view-practice">
    <div class="prac-header">
      <button class="back-btn" onclick="showList()">← Back</button>
      <div class="prac-meta">
        <div class="prac-cat-label" id="prac-cat-label"></div>
        <div class="prac-diff" id="prac-diff"></div>
      </div>
      <button class="done-toggle" id="done-toggle" onclick="toggleDone()">Mark done</button>
    </div>
    <div class="prac-body" id="prac-body">
      <div class="twister-display">
        <div class="diff-row">
          <div class="diff-pip" id="diff-pip"></div>
          <div class="diff-text" id="diff-text"></div>
        </div>
        <div class="twister-text" id="prac-twister"></div>
      </div>
      <div class="tip-box" id="prac-tip"></div>
      <div class="section-head">word breakdown — tap to explore</div>
      <div class="words-grid" id="words-grid"></div>
      <div class="word-detail" id="word-detail">
        <div class="placeholder-msg">Tap any word above to see its breakdown.</div>
      </div>
      <div class="nav-arrows">
        <button onclick="navTwister(-1)">← Prev</button>
        <button onclick="navTwister(1)">Next →</button>
      </div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="stats-scroll">
      <div class="stats-title">Your progress</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-label">practiced</div></div>
        <div class="stat-card"><div class="stat-num">12</div><div class="stat-label">total twisters</div></div>
      </div>
      <div class="cat-stat-wrap">
        <div class="cat-stat-label">by sound category</div>
        <div id="cat-progress"></div>
      </div>
      <button class="reset-btn" onclick="resetProgress()">Reset all progress</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" id="tab-list" onclick="switchTab('list')">
      <span class="tab-icon">☰</span>Practice
    </button>
    <button class="nav-tab" id="tab-stats" onclick="switchTab('stats')">
      <span class="tab-icon">◎</span>Progress
    </button>
  </div>
</div>

<script>
const TWISTERS = [
  { id:0, category:"th", difficulty:"easy",
    text:"The thirty-three thieves thought that they thrilled the throne throughout Thursday.",
    tip:"This sentence is packed with <strong>th</strong> — both the voiceless kind (θ, like a whisper through your teeth) and the voiced kind (ð, with a buzz). The hardest word is <strong>thrilled</strong>: θr cluster at the start, -ld cluster at the end. Go word by word first.",
    words:[
      {word:"The",ipa:"/ðə/",thType:"voiced",detail:"<strong>ð</strong> — tongue tip lightly between your teeth, then hum so you feel a buzz. NOT /ด/ or /ต/. It's softer and airier. The closest trap is saying /ดะ/ — /ด/ blocks airflow completely, while /ðə/ lets air flow past your tongue."},
      {word:"thirty",ipa:"/ˈθɜː.ti/",thType:"voiceless",detail:"<strong>θ</strong> — same tongue position as voiced th, but no buzz. Just push air out while your tongue touches your teeth. The trap is saying <em>terty</em>. With /ต/, tongue hits the roof of your mouth. With /θ/, it stays at your teeth and air flows through."},
      {word:"three",ipa:"/θriː/",thType:"voiceless",detail:"Double challenge: voiceless <strong>θ</strong> immediately followed by <strong>r</strong>. Don't insert a vowel between them (no <em>tuh-ree</em>). One smooth motion: teeth → air → tongue curls back for /r/. Slow: <em>θ... r... iː</em> → <em>θr... iː</em> → <em>θriː</em>"},
      {word:"thieves",ipa:"/θiːvz/",thType:"voiceless",detail:"Starts with voiceless <strong>θ</strong>. The ending <strong>-ves</strong> = /vz/ — two final consonants: /v/ (top teeth on lower lip, buzzing) then /z/. Thai words don't end in consonant clusters — resist simplifying to just /f/ or /v/."},
      {word:"thought",ipa:"/θɔːt/",thType:"voiceless",detail:"Voiceless <strong>θ</strong>. Vowel <strong>ɔː</strong> = long, round 'aw'. End on a clear <strong>/t/</strong> — don't drop it or soften it to a glottal stop. Land on it firmly."},
      {word:"that",ipa:"/ðæt/",thType:"voiced",detail:"Buzzy voiced <strong>ð</strong>. Vowel <strong>æ</strong> = short, bright 'a' — jaw drops a bit. Common mistake: saying /ดัด/ or /แทท/. The th must be the buzzy voiced sound through your teeth, not a hard /d/ or /t/."},
      {word:"they",ipa:"/ðeɪ/",thType:"voiced",detail:"Voiced <strong>ð</strong> — buzzy. Then gliding vowel <strong>eɪ</strong>, like Thai เอ with a slight /ย/ at the end. One of the most common English words and most commonly mispronounced by Thai speakers — don't let it become /เด/."},
      {word:"thrilled",ipa:"/θrɪld/",thType:"voiceless",detail:"Hardest word. Three challenges: (1) Voiceless <strong>θ</strong> into <strong>r</strong> — no vowel between. (2) Short vowel <strong>ɪ</strong> — relaxed, brief. (3) Ending cluster <strong>-ld</strong> — both /l/ and /d/ must be there. Slow: <em>θ... r... ɪ... l... d</em>"},
      {word:"the",ipa:"/ðə/",thType:"voiced",detail:"Same as the first word. Coming right after <em>thrilled</em> which ends in /d/, this <em>the</em> starts with <strong>ð</strong>. Keep it distinct — don't let the /d/ of <em>thrilled</em> swallow the start of <em>the</em>."},
      {word:"throne",ipa:"/θrəʊn/",thType:"voiceless",detail:"Another <strong>θr</strong> cluster. The vowel <strong>əʊ</strong> glides from 'uh' toward /w/, like Thai โอ with slight movement. End on <strong>/n/</strong> — tongue goes to roof of mouth, sound through your nose."},
      {word:"throughout",ipa:"/θruːˈaʊt/",thType:"voiceless",detail:"<strong>θr</strong> cluster again. Long <strong>uː</strong> vowel. Then <strong>-out</strong>: vowel <strong>aʊ</strong> + final <strong>/t/</strong>. Land on that /t/. Stress on second syllable: <em>θruː-AWT</em>."},
      {word:"Thursday",ipa:"/ˈθɜːz.deɪ/",thType:"voiceless",detail:"Final <strong>θ</strong>. Vowel <strong>ɜː</strong> = the 'er' sound as in <em>thirty</em> — lips relaxed, tongue mid-mouth. Then <strong>-z-</strong> in the middle (not /s/!), and <strong>-day</strong> ending. Stress on first syllable: <em>THUR</em>-sday."}
    ]
  },
  { id:1, category:"th", difficulty:"medium",
    text:"This, that, these, those, they, them, their, there, then, though, through, thorough.",
    tip:"A vocabulary drill. Two different th sounds are mixed — <strong>voiced (buzzy ð)</strong> for this/that/these/those/they/them/their/there/then/though, <strong>voiceless (airy θ)</strong> for through/thorough. Practice feeling the difference in your throat.",
    words:[
      {word:"This",ipa:"/ðɪs/",thType:"voiced",detail:"Voiced <strong>ð</strong> — tongue at teeth, buzz. Short <strong>ɪ</strong> vowel. Final /s/ must be clear. One of the highest-frequency words in English."},
      {word:"that",ipa:"/ðæt/",thType:"voiced",detail:"Voiced <strong>ð</strong>. Vowel <strong>æ</strong> = bright, short 'a'. End clearly on /t/. Don't let it become /ดัด/."},
      {word:"these",ipa:"/ðiːz/",thType:"voiced",detail:"Voiced <strong>ð</strong>, then long <strong>iː</strong>. End on /z/ — buzzing, not the same as /s/. Put your hand on your throat to feel the vocal cord vibration."},
      {word:"those",ipa:"/ðəʊz/",thType:"voiced",detail:"Voiced <strong>ð</strong>. Vowel <strong>əʊ</strong> glides like Thai โอ. Ends on /z/. Pair with <em>these</em>: these /ðiːz/ → those /ðəʊz/ — same th, different vowel."},
      {word:"they",ipa:"/ðeɪ/",thType:"voiced",detail:"Voiced <strong>ð</strong> + gliding vowel <strong>eɪ</strong>. Don't let it become /เด/ — push your tongue to your teeth."},
      {word:"them",ipa:"/ðem/",thType:"voiced",detail:"Voiced <strong>ð</strong>. Simple vowel <strong>e</strong>, then lips close for /m/. Make sure the th is buzzy, not a /d/."},
      {word:"their",ipa:"/ðeə/",thType:"voiced",detail:"Voiced <strong>ð</strong> + vowel <strong>eə</strong> — glides from 'eh' to a neutral 'uh'. Identical to <em>there</em> and <em>they're</em> — all three homophones."},
      {word:"there",ipa:"/ðeə/",thType:"voiced",detail:"Voiced <strong>ð</strong>. Same pronunciation as <em>their</em> — both /ðeə/. Focus on getting the ð crisp at the start."},
      {word:"then",ipa:"/ðen/",thType:"voiced",detail:"Voiced <strong>ð</strong> + short <strong>e</strong> + final /n/. Quick word — don't drag the vowel out."},
      {word:"though",ipa:"/ðəʊ/",thType:"voiced",detail:"Still voiced <strong>ð</strong> (despite the 'gh' — ignore it). Vowel <strong>əʊ</strong> glides like Thai โอ. The <strong>-gh</strong> is completely silent."},
      {word:"through",ipa:"/θruː/",thType:"voiceless",detail:"Now voiceless <strong>θ</strong> — switching from buzzy ð. Then <strong>r</strong> immediately after, no vowel between. Long <strong>uː</strong> at the end. The <strong>-ough</strong> spelling is completely misleading — it's just /uː/."},
      {word:"thorough",ipa:"/ˈθʌr.ə/",thType:"voiceless",detail:"Voiceless <strong>θ</strong>. Two syllables: <em>THUH-ruh</em>. First vowel <strong>ʌ</strong> = short 'uh'. Second syllable is just neutral /ə/. Don't say <em>tho-ROW</em> — stress is on the first syllable."}
    ]
  },
  { id:2, category:"rl", difficulty:"medium",
    text:"Red lorry, yellow lorry, red lorry, yellow lorry.",
    tip:"<strong>r</strong> and <strong>l</strong> alternate rapidly. English /r/ = tongue curls back slightly, never touching anything. English /l/ = tongue tip taps firmly behind your upper teeth. Say them on their own first: <em>rrr... lll... rrr... lll</em>.",
    words:[
      {word:"Red",ipa:"/red/",thType:"none",detail:"English <strong>/r/</strong> — tongue curls back slightly, doesn't touch any surface. Very different from Thai /ร/. Start with /r/ alone, curl back, then open into vowel <strong>e</strong>. End with clear /d/."},
      {word:"lorry",ipa:"/ˈlɒr.i/",thType:"none",detail:"Starts with English <strong>/l/</strong> — tongue tip firmly behind your upper front teeth, then peel it away. Short <strong>ɒ</strong> vowel. Then /r/ in the middle — tongue curls back. Two syllables: <em>LOH-ree</em>."},
      {word:"yellow",ipa:"/ˈjel.əʊ/",thType:"none",detail:"Starts with /j/ (like Thai /ย/). Then <strong>/l/</strong> in the middle — tongue tip to upper teeth. The <strong>əʊ</strong> at the end glides like Thai โอ. Two syllables: <em>YEL-oh</em>."}
    ]
  },
  { id:3, category:"rl", difficulty:"hard",
    text:"Really rural, really rural, really rural.",
    tip:"Brutal by design. Each word has both <strong>r</strong> and <strong>l</strong>, forcing rapid switching. Go painfully slow at first. Speed is the enemy — accuracy at slow speed will carry to fast speed. Speed without accuracy just reinforces wrong habits.",
    words:[
      {word:"Really",ipa:"/ˈriː.li/",thType:"none",detail:"Two syllables: <em>REE-lee</em>. Starts with <strong>/r/</strong> (tongue curls back), then long <strong>iː</strong>, then <strong>/l/</strong> (tongue snaps to upper teeth), then short <strong>i</strong>. The /r/ → /l/ switch mid-word is the whole challenge."},
      {word:"rural",ipa:"/ˈrʊər.əl/",thType:"none",detail:"Two syllables: <em>ROO-rul</em>. Starts with <strong>/r/</strong>, then vowel <strong>ʊə</strong> (like 'oo' + 'uh' glide), then another <strong>/r/</strong>, then ends with <strong>/l/</strong>. Three liquid consonants in two syllables: r, r, l."}
    ]
  },
  { id:4, category:"rl", difficulty:"medium",
    text:"Around the rugged rocks the ragged rascal ran.",
    tip:"Seven words starting with or containing <strong>/r/</strong>. Use this to build /r/ muscle memory — tongue curling back, never touching, air flowing freely. If /r/ feels automatic here, it'll stop taking conscious effort in real speech.",
    words:[
      {word:"Around",ipa:"/əˈraʊnd/",thType:"none",detail:"Starts with neutral <strong>ə</strong> ('uh'), then <strong>/r/</strong>. Vowel <strong>aʊ</strong> glides from open 'ah'. Ends in <strong>/nd/</strong>. Stress on second syllable: <em>uh-ROWND</em>."},
      {word:"rugged",ipa:"/ˈrʌɡ.ɪd/",thType:"none",detail:"Starts with <strong>/r/</strong>. Vowel <strong>ʌ</strong> = short, central 'uh'. Then hard /ɡ/. Two syllables: <em>RUG-id</em>."},
      {word:"rocks",ipa:"/rɒks/",thType:"none",detail:"Starts with <strong>/r/</strong>. Short <strong>ɒ</strong> vowel. Ends in /ks/ — two final consonants, both must be audible."},
      {word:"ragged",ipa:"/ˈræɡ.ɪd/",thType:"none",detail:"Starts with <strong>/r/</strong>. Vowel <strong>æ</strong> = bright, short 'a'. <em>Ragged</em> vs <em>rugged</em>: æ (brighter) vs ʌ (more central)."},
      {word:"rascal",ipa:"/ˈræs.kəl/",thType:"none",detail:"Starts with <strong>/r/</strong>. Vowel <strong>æ</strong>. Two syllables: <em>RAS-kul</em>. The <strong>-cal</strong> ending = /kəl/ — a neutral 'uh' before the /l/."},
      {word:"ran",ipa:"/ræn/",thType:"none",detail:"Starts with <strong>/r/</strong>. Vowel <strong>æ</strong>. End clearly on <strong>/n/</strong>. Short, punchy — but don't drop that final /n/."}

  { id:5, category:"vw", difficulty:"easy",
    text:"Vivid vines and violet violets vow to vanish in the valley.",

    words:[
      {word:"Vivid",ipa:"/ˈvɪv.ɪd/",thType:"none",detail:"<strong>v</strong> — upper teeth on lower lip, buzz. The word starts AND has /v/ in the middle — two chances to practice. Short <strong>ɪ</strong> vowels throughout. Neither /v/ should become /w/ or /b/."},
      {word:"vines",ipa:"/vaɪnz/",thType:"none",detail:"<strong>v</strong> at the start. Gliding vowel <strong>aɪ</strong> (like Thai ไ). Ends in /nz/ — /n/ then /z/, both must be audible."},
      {word:"violet",ipa:"/ˈvaɪ.ə.lɪt/",thType:"none",detail:"<strong>v</strong> at the start. Three syllables: <em>VY-uh-lit</em>. Vowel <strong>aɪ</strong> glides, then brief neutral <strong>ə</strong>, then /lɪt/ — tongue to teeth, short ɪ, final /t/."},
      {word:"vow",ipa:"/vaʊ/",thType:"none",detail:"<strong>v</strong> at the start — teeth on lip. Then gliding <strong>aʊ</strong> like Thai เอา. Short punchy word, but the /v/ must be crisp."},
      {word:"vanish",ipa:"/ˈvæn.ɪʃ/",thType:"none",detail:"<strong>v</strong> at the start. Vowel <strong>æ</strong> — bright 'a'. Then /n/, then the <strong>-ish</strong> ending = /ɪʃ/. Two syllables: <em>VAN-ish</em>."},
      {word:"valley",ipa:"/ˈvæl.i/",thType:"none",detail:"<strong>v</strong> at the start. Then /æ/ + /l/ — tongue firmly at upper teeth for the /l/. Two syllables: <em>VAL-ee</em>."}
    ]

  { id:6, category:"vw", difficulty:"medium",

    tip:"All <strong>wh/w</strong> words here = rounded lips, no teeth. Note: <em>whether</em> and <em>weather</em> are homophones — identical pronunciation. Also notice <em>whatever</em> has both /w/ AND /v/ — two different labial consonants.",
    words:[
      {word:"Whether",ipa:"/ˈweð.ə/",thType:"voiced",detail:"Starts with <strong>/w/</strong> — rounded lips, no teeth. Then voiced <strong>ð</strong> in the middle. Two syllables: <em>WETH-uh</em>. Identical pronunciation to <em>weather</em> — they are true homophones."},
      {word:"weather",ipa:"/ˈweð.ə/",thType:"voiced",detail:"Identical to <em>whether</em> — /ˈweðə/. <strong>/w/</strong> rounded lips, then voiced <strong>ð</strong>, then neutral /ə/. Two syllables: <em>WETH-uh</em>."},
      {word:"warm",ipa:"/wɔːm/",thType:"none",detail:"<strong>/w/</strong> with rounded lips. Vowel <strong>ɔː</strong> = long, round 'aw'. End with /m/ — lips close. Don't shorten the long vowel."},
      {word:"we",ipa:"/wiː/",thType:"none",detail:"<strong>/w/</strong> with rounded lips, then long <strong>iː</strong>. Simple but easy to let the /w/ go flat. Make sure lips are visibly rounded before the sound starts."},
      {word:"will",ipa:"/wɪl/",thType:"none",detail:"<strong>/w/</strong> then short <strong>ɪ</strong> then <strong>/l/</strong> (tongue to upper teeth). End clearly on the /l/ — a very commonly dropped sound for Thai speakers."},
      {word:"whatever",ipa:"/wɒtˈev.ə/",thType:"none",detail:"<strong>/w/</strong> rounded, then <strong>-at-</strong> with short <strong>ɒ</strong>. Then <strong>-ev-</strong> with <strong>/v/</strong> — teeth on lip. Then neutral /ə/. Stress on second syllable: <em>wot-EV-uh</em>. Both /w/ and /v/ must be distinct."}
    ]
  },
  { id:7, category:"final", difficulty:"easy",
    text:"She sells seashells by the seashore.",

    words:[
      {word:"She",ipa:"/ʃiː/",thType:"none",detail:"The <strong>sh</strong> sound /ʃ/ — lips push forward slightly, tongue behind teeth, air makes a hushing sound. Long <strong>iː</strong> vowel. Not the same as /s/ — /ʃ/ is warmer and more rounded."},
      {word:"sells",ipa:"/selz/",thType:"none",detail:"<strong>/s/</strong> at start. Short <strong>e</strong> vowel. Then <strong>/l/</strong> — tongue to upper teeth. Then <strong>/z/</strong> buzzing at the end. The /lz/ cluster is where Thai speakers often stop early. Both must be audible."},
      {word:"seashells",ipa:"/ˈsiːˌʃelz/",thType:"none",detail:"Compound: <em>sea</em> + <em>shells</em>. Starts /s/ + long <strong>iː</strong>. Then <strong>/ʃ/</strong> for 'sh'. Then <strong>e</strong> vowel, then same <strong>/lz/</strong> ending as <em>sells</em>. Two syllables: <em>SEE-shellz</em>."},
      {word:"seashore",ipa:"/ˈsiːˌʃɔː/",thType:"none",detail:"Compound: <em>sea</em> + <em>shore</em>. Starts /s/ + long <strong>iː</strong>. Then <strong>/ʃ/</strong> + vowel <strong>ɔː</strong> (long 'aw'). The /r/ barely appears — it just colours the vowel."}
    ]
  },
  { id:8, category:"final", difficulty:"medium",
    text:"I thought a thought, but the thought I thought was not the thought I thought I thought.",
    tip:"Every <strong>-ght</strong> is silent — the word ends on a /t/. Thai speakers often soften or drop the final /t/. Don't. Each <em>thought</em> ends with a firm /t/ where your tongue touches the ridge and releases. Not a glottal stop — an actual /t/.",
    words:[
      {word:"thought",ipa:"/θɔːt/",thType:"voiceless",detail:"Voiceless <strong>θ</strong> at the start. Vowel <strong>ɔː</strong> = long 'aw'. The <strong>-ght</strong> is completely silent. Ends on <strong>/t/</strong> — a real /t/, not a glottal stop. Your tongue must touch the roof of your mouth and release. Say it: teeth-air → long 'aw' → tongue taps → release."},
      {word:"not",ipa:"/nɒt/",thType:"none",detail:"/n/ — tongue on roof, sound through nose. Short <strong>ɒ</strong> vowel. Final <strong>/t/</strong> — firm landing. Don't drop it."}
    ]
  },
  { id:9, category:"final", difficulty:"medium",
    text:"Mixed biscuits, mixed biscuits, mixed biscuits.",
    tip:"The challenge is <strong>-xed</strong> = /kst/ and <strong>-its</strong> = /ts/. Thai syllable structure doesn't allow these end clusters, so there's a strong pull to simplify. Resist — say every consonant, especially at the end of each word.",
    words:[
      {word:"Mixed",ipa:"/mɪkst/",thType:"none",detail:"Ends in three-consonant cluster <strong>/kst/</strong>. The 'x' = /ks/, then past tense adds /t/. So: m-ɪ-k-s-t. Don't simplify to just /mɪks/ — the final /t/ needs to be there. Slow: <em>mix... t</em>."},
      {word:"biscuits",ipa:"/ˈbɪs.kɪts/",thType:"none",detail:"Two syllables: <em>BIS-kits</em>. The <strong>-uits</strong> ending = /ɪts/ — short ɪ then /ts/. The /ts/ cluster at the end is two sounds: /t/ immediately followed by /s/. Don't drop the /t/."}
    ]
  },
  { id:10, category:"cluster", difficulty:"medium",
    text:"Strange strategic strengths stretch strangely.",
    tip:"The <strong>str-</strong> cluster is the focus. Thai doesn't have consonant clusters at syllable starts — there's always a pull to insert a vowel ('sa-trange'). Don't. The three consonants flow as one breath of air with no vowel between them.",
    words:[
      {word:"Strange",ipa:"/streɪndʒ/",thType:"none",detail:"<strong>str-</strong> cluster: /s/ → /t/ → /r/ with no vowels between. One breath. Vowel <strong>eɪ</strong> glides (like Thai เอ + ย). Ends with <strong>/ndʒ/</strong>. Slow: <em>s... t... r... eɪ... ndʒ</em>."},
      {word:"strategic",ipa:"/strəˈtiː.dʒɪk/",thType:"none",detail:"<strong>str-</strong> cluster again. Three syllables: <em>struh-TEE-jik</em>. Stress on second syllable. The <strong>-gic</strong> ending = /dʒɪk/ — 'g' makes a 'j' sound here."},
      {word:"strengths",ipa:"/streŋkθs/",thType:"voiceless",detail:"Hardest word here. The <strong>str-</strong> at the start, then <strong>-engths</strong> = /eŋkθs/ — FOUR consonants at the end: /ŋ/ (ng), /k/, /θ/ (voiceless th), /s/. Slow: <em>str... eŋ... k... θ... s</em>."},
      {word:"stretch",ipa:"/stretʃ/",thType:"none",detail:"<strong>str-</strong> cluster. Short vowel <strong>e</strong>. Ends in <strong>/tʃ/</strong> — the 'ch' sound. One syllable. End /tʃ/ = tongue on the ridge, release with a 'sh'-like sound."},
      {word:"strangely",ipa:"/ˈstreɪndʒ.li/",thType:"none",detail:"<em>strange</em> + <strong>-ly</strong>. Two syllables: <em>STRAINJ-lee</em>. The <strong>-ly</strong> adds /li/ — /l/ with tongue to upper teeth, then short /i/. Don't let the /l/ disappear."}
    ]
  },
  { id:11, category:"cluster", difficulty:"hard",
    text:"The sixth sick sheikh's sixth sheep's sick.",
    tip:"Often cited as the hardest tongue twister in English. The <strong>-xth</strong> in 'sixth' is a genuine cluster: /ks/ + /θ/ = three consonants at the end. And <em>sheikh</em> is just /ʃeɪk/ — like 'shake'. Go painfully slow. There's no shame in this one being hard.",
    words:[
      {word:"sixth",ipa:"/sɪksθ/",thType:"voiceless",detail:"Ends in <strong>/ksθ/</strong> — three consonants: /k/, /s/, /θ/ (voiceless th). The 'x' = /ks/, then add th. One at a time: <em>sɪk... s... θ</em>. Then: <em>sɪks... θ</em>. Then full: <em>sɪksθ</em>. Possibly the most complex word-ending in common English."},
      {word:"sick",ipa:"/sɪk/",thType:"none",detail:"Simple but easy to rush. <strong>/s/</strong> — <strong>ɪ</strong> — <strong>/k/</strong>. The final /k/ must be there. After <em>sixth</em>, this word is a relief — use it to reset before the next <em>sixth</em>."},
      {word:"sheikh's",ipa:"/ʃeɪks/",thType:"none",detail:"<strong>/ʃ/</strong> — 'sh' sound, like <em>she</em>. Then <strong>eɪ</strong> vowel glide. Then <strong>/k/</strong>. Then <strong>/s/</strong> for the possessive. So: <em>sh-AY-ks</em>. In English this is simply /ʃeɪk/ — no Arabic-style pronunciation."},
      {word:"sheep's",ipa:"/ʃiːps/",thType:"none",detail:"<strong>/ʃ/</strong> + long <strong>iː</strong> + <strong>/p/</strong> + <strong>/s/</strong>. The possessive adds /s/ after /p/. End cluster /ps/ — both must be audible: <em>shee... p... s</em>."}
    ]
  }
];

const CATS = {
  th: { label:"th sound", cls:"cat-th", color:"#d4a84b" },
  rl: { label:"r vs l", cls:"cat-rl", color:"#4ecdc4" },
  vw: { label:"v vs w", cls:"cat-vw", color:"#e8856a" },
  final: { label:"word endings", cls:"cat-final", color:"#a09080" },
  cluster: { label:"consonant clusters", cls:"cat-cluster", color:"#afa9ec" }
};

let done = [];
try { done = JSON.parse(localStorage.getItem("mt_done") || "[]"); } catch(e) {}
let currentTwister = 0;

function saveDone() { try { localStorage.setItem("mt_done", JSON.stringify(done)); } catch(e) {} }
function isDone(id) { return done.includes(id); }

function updateProgress() {
  const pct = Math.round((done.length / TWISTERS.length) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = done.length + " of " + TWISTERS.length + " practiced";
}

function buildList() {
  const catOrder = ["th","rl","vw","final","cluster"];
  let html = "";
  catOrder.forEach(cat => {
    const group = TWISTERS.filter(t => t.category === cat);
    const info = CATS[cat];
    html += `<div class="category-label">${info.label}</div>`;
    group.forEach(t => {
      const preview = t.text.length > 50 ? t.text.slice(0, 50) + "…" : t.text;
      const dotColor = { easy:"#4ecdc4", medium:"#d4a84b", hard:"#e8856a" }[t.difficulty];
      html += `<div class="twister-row ${isDone(t.id) ? "done" : ""}" onclick="openTwister(${t.id})">
        <div class="row-icon"><div style="width:10px;height:10px;border-radius:50%;background:${dotColor}"></div></div>
        <div class="row-body">
          <div class="row-title">${preview}</div>
          <div class="row-meta">
            <span class="cat-badge ${info.cls}">${info.label}</span>
            <span style="color:var(--text-dim);font-size:11px;">· ${t.difficulty}</span>
          </div>
        </div>
        <div class="row-check">✓</div>
      </div>`;
    });
  });
  document.getElementById("list-scroll").innerHTML = html;
  updateProgress();
}

function openTwister(id) {
  currentTwister = id;
  const t = TWISTERS[id];
  const info = CATS[t.category];
  document.getElementById("prac-cat-label").innerHTML = `<span class="cat-badge ${info.cls}">${info.label}</span>`;
  document.getElementById("prac-diff").textContent = t.difficulty + " difficulty";
  document.getElementById("diff-pip").className = "diff-pip diff-" + t.difficulty;
  document.getElementById("diff-text").textContent = t.difficulty;
  document.getElementById("prac-twister").textContent = t.text;
  document.getElementById("prac-tip").innerHTML = t.tip;
  const btn = document.getElementById("done-toggle");
  btn.textContent = isDone(id) ? "✓ Done" : "Mark done";
  btn.className = "done-toggle" + (isDone(id) ? " marked" : "");
  document.getElementById("words-grid").innerHTML = t.words.map((w, i) => {
    const hasSound = w.thType !== "none";
    return `<div class="word-chip ${hasSound ? "has-th" : ""}" id="chip-${i}" onclick="selectWord(${i})">
      <div class="wc-word">${w.word}</div>
      <div class="wc-ipa">${w.ipa}</div>
    </div>`;
  }).join("");
  document.getElementById("word-detail").innerHTML = `<div class="placeholder-msg">Tap any word above to see its breakdown.</div>`;
  document.getElementById("prac-body").scrollTop = 0;
  document.getElementById("view-list").classList.remove("active");
  document.getElementById("view-stats").classList.remove("active");
  document.getElementById("view-practice").classList.add("active");
  document.getElementById("main-header").style.display = "none";
  document.getElementById("tab-list").classList.add("active");
  document.getElementById("tab-stats").classList.remove("active");
}

function selectWord(i) {
  const t = TWISTERS[currentTwister];
  const w = t.words[i];
  document.querySelectorAll(".word-chip").forEach((c, idx) => c.classList.toggle("active", idx === i));
  const tagHtml = w.thType === "voiced"
    ? `<span class="wd-tag wd-tag-voiced">voiced th (ð)</span>`
    : w.thType === "voiceless"
    ? `<span class="wd-tag wd-tag-voiceless">voiceless th (θ)</span>`
    : `<span class="wd-tag wd-tag-none">focus sound</span>`;
  document.getElementById("word-detail").innerHTML = `
    <div class="wd-word">${w.word}</div>
    <div class="wd-ipa">${w.ipa}</div>
    ${tagHtml}
    <div class="wd-body">${w.detail}</div>`;
}

function toggleDone() {
  const id = currentTwister;
  if (isDone(id)) { done = done.filter(x => x !== id); } else { done.push(id); }
  saveDone();
  const btn = document.getElementById("done-toggle");
  btn.textContent = isDone(id) ? "✓ Done" : "Mark done";
  btn.className = "done-toggle" + (isDone(id) ? " marked" : "");
  updateProgress();
}

function showList() {
  document.getElementById("view-practice").classList.remove("active");
  document.getElementById("view-stats").classList.remove("active");
  document.getElementById("view-list").classList.add("active");
  document.getElementById("main-header").style.display = "";
  document.getElementById("tab-list").classList.add("active");
  document.getElementById("tab-stats").classList.remove("active");
  buildList();
}

function navTwister(dir) {
  openTwister((currentTwister + dir + TWISTERS.length) % TWISTERS.length);
}

function switchTab(tab) {
  document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("view-practice").classList.remove("active");
  document.getElementById("main-header").style.display = "";
  if (tab === "list") {
    document.getElementById("view-stats").classList.remove("active");
    document.getElementById("view-list").classList.add("active");
    buildList();
  } else {
    document.getElementById("view-list").classList.remove("active");
    document.getElementById("view-stats").classList.add("active");
    buildStats();
  }
}

function buildStats() {
  document.getElementById("stat-done").textContent = done.length;
  const cats = ["th","rl","vw","final","cluster"];
  let html = "";
  cats.forEach(cat => {
    const all = TWISTERS.filter(t => t.category === cat);
    const doneCount = all.filter(t => isDone(t.id)).length;
    const pct = Math.round((doneCount / all.length) * 100);
    const info = CATS[cat];
    html += `<div class="cat-stat-item">
      <div class="cat-stat-row">
        <span class="cat-badge ${info.cls}">${info.label}</span>
        <span class="cat-stat-count">${doneCount}/${all.length}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${info.color};"></div></div>
    </div>`;
  });
  document.getElementById("cat-progress").innerHTML = html;
  updateProgress();
}

function resetProgress() {
  if (confirm("Reset all progress?")) { done = []; saveDone(); buildStats(); updateProgress(); }
}

buildList();

// Scroll-hide header and nav
(function() {
  let lastY = 0;
  let ticking = false;

  function onScroll(e) {
    const el = e.target;
    if (!ticking) {
      requestAnimationFrame(() => {
        const y = el.scrollTop;
        const goingDown = y > lastY && y > 40;
        const goingUp = y < lastY;

        const header = document.getElementById("main-header");
        const pracHeader = document.querySelector(".prac-header");
        const nav = document.querySelector(".bottom-nav");

        if (goingDown) {
          if (header) header.classList.add("hidden");
          if (pracHeader) pracHeader.classList.add("hidden");
          nav.classList.add("hidden");
        } else if (goingUp) {
          if (header) header.classList.remove("hidden");
          if (pracHeader) pracHeader.classList.remove("hidden");
          nav.classList.remove("hidden");
        }

        lastY = y;
        ticking = false;
      });
      ticking = true;
    }
  }

  ["list-scroll", "prac-body", "stats-scroll"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("scroll", onScroll, { passive: true });
  });
})();
</script>

</html>
